name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  app:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      - run: flutter analyze
      - run: flutter test

  build-apk:
    runs-on: ubuntu-latest
    needs: app
    if: github.ref == 'refs/heads/main'
    defaults:
      run:
        working-directory: app
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"
      - uses: subosito/flutter-action@v2
        with:
          channel: stable
      - run: flutter pub get
      # Debug APK for now; release signing (keystore secrets) wired in Phase 2.
      - run: flutter build apk --debug
      - uses: actions/upload-artifact@v4
        with:
          name: bloom-debug-apk
          path: app/build/app/outputs/flutter-apk/app-debug.apk
